#
# =============================================================================
# Portable tmux configuration
# Works on Windows, macOS, and RHEL 8
# =============================================================================
#

# =============================================================================
# Terminal
# =============================================================================

# Keep screen-256color for compatibility with older systems (e.g. RHEL 8)
set -g default-terminal "screen-256color"

# Enable 24-bit (true color) support on modern tmux versions.
set -as terminal-features ",*:RGB"

# If the line above produces an "invalid option" (or similar) error,
# comment it out and uncomment the lines below instead. These are
# compatible with older tmux versions.
#
# set -ga terminal-overrides ",xterm-256color:Tc"
# set -ga terminal-overrides ",screen-256color:Tc"

# =============================================================================
# General
# =============================================================================

set -g escape-time 0
set -g history-limit 100000
set -g mouse on
set -g set-clipboard external

# Notify applications (e.g. Vim/Neovim) when the terminal gains or loses focus.
set -g focus-events on

# Refresh status bar every 15 seconds
set -g status-interval 15

# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# =============================================================================
# Appearance
# =============================================================================

# Let the terminal theme control most colors.
# Only customize layout and a handful of useful visual settings.

set -g status-position bottom
set -g status-justify left

set -g status-left-length 20
set -g status-left "[#S] "

set -g status-right-length 60
set -g status-right "\"#H\" %H:%M %d-%b-%Y"

set -g window-status-format " [#I] #W#F "
set -g window-status-current-format " [#I] #W#F "
set -g window-status-current-style bold

set -g window-status-separator ""

# Slightly emphasize the active pane
set -g pane-active-border-style bold

set -g display-panes-time 3000
set -g clock-mode-style 24

# =============================================================================
# Splits & Windows
# =============================================================================

# Split in the current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Replace the default split bindings
unbind '"'
unbind %

# Create a new window in the current working directory
bind c new-window -c "#{pane_current_path}"

# Rename the current window with the built-in tmux binding:
# Prefix + ,

# =============================================================================
# Navigation
# =============================================================================

# Pane navigation (within the current window)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation
bind -n M-Left previous-window
bind -n M-Right next-window

# Toggle pane zoom
bind -n M-Up resize-pane -Z

# =============================================================================
# Copy Mode
# =============================================================================

# Use Vim-style navigation in copy mode
setw -g mode-keys vi

# Visual mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Visual block mode
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Yank selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =============================================================================
# Utilities
# =============================================================================

# Reload configuration
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"